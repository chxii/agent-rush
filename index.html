<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Rush - MEV 控制台</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config/env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ajv@8/dist/ajv.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="top-band">
        <div>
          <p class="eyebrow">Agent Rush</p>
          <h1>MEV 执行控制台</h1>
          <span class="terminal-subtitle">MEV EXECUTION CONSOLE</span>
          <div class="codex-button-row">
            <button id="codex-button" class="secondary-button codex-button" type="button">游戏规则与图鉴</button>
            <a class="github-button" href="https://github.com/chxii/agent-rush" target="_blank" rel="noopener noreferrer" aria-label="在 GitHub 查看源码">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 0.296997C5.37 0.296997 0 5.67 0 12.297C0 17.6 3.438 22.097 8.205 23.682C8.805 23.795 9.025 23.424 9.025 23.105C9.025 22.82 9.015 22.065 9.01 21.065C5.672 21.789 4.968 19.455 4.968 19.455C4.422 18.07 3.633 17.7 3.633 17.7C2.546 16.956 3.717 16.971 3.717 16.971C4.922 17.055 5.555 18.207 5.555 18.207C6.625 20.042 8.364 19.512 9.05 19.205C9.158 18.429 9.467 17.9 9.81 17.6C7.145 17.3 4.344 16.268 4.344 11.67C4.344 10.36 4.809 9.29 5.579 8.45C5.444 8.147 5.039 6.927 5.684 5.274C5.684 5.274 6.689 4.952 8.984 6.504C9.944 6.237 10.964 6.105 11.984 6.099C13.004 6.105 14.024 6.237 14.984 6.504C17.264 4.952 18.269 5.274 18.269 5.274C18.914 6.927 18.509 8.147 18.389 8.45C19.154 9.29 19.619 10.36 19.619 11.67C19.619 16.28 16.814 17.295 14.144 17.59C14.564 17.95 14.954 18.686 14.954 19.81C14.954 21.416 14.939 22.706 14.939 23.096C14.939 23.411 15.149 23.786 15.764 23.666C20.565 22.092 24 17.592 24 12.297C24 5.67 18.627 0.296997 12 0.296997Z" fill="currentColor"></path>
              </svg>
              <span class="text">GitHub</span>
            </a>
          </div>
        </div>
        <div id="header" class="header-grid"></div>
      </section>

      <section id="rolestrip" class="rolestrip" aria-live="polite"></section>

      <section class="main-grid">
        <section class="play-surface">
          <div id="hand-area" class="hand-area"></div>
          <section id="thought-area" class="thought-area" aria-live="polite" hidden></section>
        </section>

        <aside id="log-panel" class="log-panel" aria-live="polite"></aside>
      </section>

      <section id="action-bar" class="action-bar">
        <div>
          <p class="label">回合计时</p>
          <strong id="round-timer">就绪</strong>
        </div>
        <button id="skip-button" class="secondary-button" type="button">跳过</button>
        <button id="play-button" class="primary-button" type="button" disabled>执行</button>
      </section>

      <section id="debug-panel" class="debug-panel" style="display:none">
        <button type="button" onclick="jumpToLayer(10)">跳到第 10 层</button>
        <button type="button" onclick="jumpToLayer(18)">跳到第 18 层</button>
        <button type="button" onclick="injectPhantomSteal()">触发 Phantom 抢占</button>
        <button type="button" onclick="injectScamCard()">注入骗局牌</button>
        <button type="button" onclick="toggleDemoSeed()">固定种子 Demo</button>
      </section>
    </main>

    <script type="module">
      import { GameState } from './src/core/GameState.js'
      import { createBrowserStorage } from './src/core/storage.js'
      import { RoundEngine } from './src/game/RoundEngine.js'
      import { ProgressionEngine } from './src/game/ProgressionEngine.js'
      import { UIRenderer } from './src/ui/UIRenderer.js'
      import { OverlayManager } from './src/ui/OverlayManager.js'
      import { ThoughtChainPanel } from './src/ui/ThoughtChainPanel.js'
      import { ExecutorAI } from './src/ai/ExecutorAI.js'

      UIRenderer.init()
      ExecutorAI.init()
      GameState.init({ storage: createBrowserStorage(window.localStorage) })
      if (new URLSearchParams(window.location.search).get('tutorial') === '1') {
        GameState.tutorialSeen = false
        GameState.currentLayer = 1
        GameState.saveProgress()
      }
      ThoughtChainPanel.setDisplayId(GameState.displayId)
      const startRound = (gameState) => RoundEngine.startRound(gameState)
      startRound.resetRunIntroState = () => RoundEngine.resetRunIntroState()
      ProgressionEngine.setRoundStarter(startRound)

      UIRenderer.onCardClick((cardId) => RoundEngine.toggleCard(cardId))
      UIRenderer.onPlayClick((options) => {
        if (GameState.phase === 'execute') {
          RoundEngine.confirmSettle()
          return
        }
        RoundEngine.confirmPlay(options)
      })
      UIRenderer.onDecisionChange((input) => RoundEngine.handleDecisionChange(input))
      UIRenderer.onInterventionRequest((input) => {
        if (input?.type === 'skip_window') {
          RoundEngine.skipInterventionWindow()
          return
        }
        RoundEngine.handleInterventionRequest(input)
      })
      document.querySelector('#codex-button').addEventListener('click', () => {
        RoundEngine.pauseTimers()
        OverlayManager.showCodex(() => RoundEngine.resumeTimers())
      })

      const beginRun = () => {
        if (!GameState.tutorialSeen) {
          OverlayManager.showWelcome(() => {
            ProgressionEngine.startRun(GameState)
          })
          return
        }

        ProgressionEngine.startRun(GameState)
      }

      OverlayManager.showStartMenu(GameState, beginRun)

      window.GameState = GameState
      window.RoundEngine = RoundEngine
      window.ProgressionEngine = ProgressionEngine
      window.jumpToLayer = (layer) => RoundEngine.jumpToLayer(layer)
      window.injectPhantomSteal = () => RoundEngine.injectPhantomSteal()
      window.injectScamCard = () => RoundEngine.injectScamCard()
      window.toggleDemoSeed = () => RoundEngine.toggleDemoSeed()

      if (new URLSearchParams(window.location.search).get('debug') === '1') {
        document.querySelector('#debug-panel').style.display = 'flex'
      }
    </script>
  </body>
</html>
