<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Rush - MEV 模拟器</title>
    <link rel="stylesheet" href="style.css">
    <script src="config/env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ajv@8/dist/ajv.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="top-band">
        <div>
          <p class="eyebrow">Agent Rush</p>
          <h1>MEV 执行控制台</h1>
          <button id="codex-button" class="secondary-button codex-button" type="button">图鉴</button>
        </div>
        <div id="header" class="header-grid"></div>
      </section>

      <section class="main-grid">
        <aside class="side-panel">
          <h2>角色</h2>
          <div id="agent-panel" class="agent-list"></div>
        </aside>

        <section class="play-surface">
          <div id="mempool-view" class="mempool-view" aria-label="Mempool stream">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div id="hand-area" class="hand-area"></div>
        </section>

        <aside id="log-panel" class="log-panel" aria-live="polite"></aside>
      </section>

      <section id="action-bar" class="action-bar">
        <div>
          <p class="label">回合计时</p>
          <strong id="round-timer">就绪</strong>
        </div>
        <button id="skip-button" class="secondary-button" type="button">跳过</button>
        <button id="play-button" class="primary-button" type="button" disabled>执行</button>
      </section>

      <section id="debug-panel" class="debug-panel" style="display:none">
        <button type="button" onclick="jumpToLayer(10)">跳到层 10 (Demo点)</button>
        <button type="button" onclick="jumpToLayer(18)">跳到层 18 (Demo点)</button>
        <button type="button" onclick="injectPhantomSteal()">触发Phantom抢占</button>
        <button type="button" onclick="injectScamCard()">注入骗局牌</button>
      </section>
    </main>

    <script type="module">
      import { GameState } from './src/core/GameState.js'
      import { createBrowserStorage } from './src/core/storage.js'
      import { RoundEngine } from './src/game/RoundEngine.js'
      import { ProgressionEngine } from './src/game/ProgressionEngine.js'
      import { UIRenderer } from './src/ui/UIRenderer.js'
      import { OverlayManager } from './src/ui/OverlayManager.js'
      import { ExecutorAI } from './src/ai/ExecutorAI.js'

      UIRenderer.init()
      ExecutorAI.init()
      GameState.init({ storage: createBrowserStorage(window.localStorage) })
      ProgressionEngine.setRoundStarter((gameState) => RoundEngine.startRound(gameState))

      UIRenderer.onCardClick((cardId) => RoundEngine.toggleCard(cardId))
      UIRenderer.onPlayClick((options) => RoundEngine.confirmPlay(options))
      UIRenderer.onDecisionChange((input) => RoundEngine.handleDecisionChange(input))
      UIRenderer.onInterventionRequest((input) => RoundEngine.handleInterventionRequest(input))
      document.querySelector('#codex-button').addEventListener('click', () => {
        RoundEngine.pauseTimers()
        OverlayManager.showCodex(() => RoundEngine.resumeTimers())
      })

      const beginRun = () => {
        if (!GameState.tutorialSeen) {
          OverlayManager.showWelcome(() => {
            GameState.markTutorialSeen()
            ProgressionEngine.startRun(GameState)
          })
          return
        }

        ProgressionEngine.startRun(GameState)
      }

      OverlayManager.showStartMenu(GameState, beginRun)

      window.GameState = GameState
      window.RoundEngine = RoundEngine
      window.ProgressionEngine = ProgressionEngine
      window.jumpToLayer = (layer) => RoundEngine.jumpToLayer(layer)
      window.injectPhantomSteal = () => RoundEngine.injectPhantomSteal()
      window.injectScamCard = () => RoundEngine.injectScamCard()

      if (new URLSearchParams(window.location.search).get('debug') === '1') {
        document.querySelector('#debug-panel').style.display = 'flex'
      }
    </script>
  </body>
</html>
