<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Rush — Demo 幻灯</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- =====================================================================
       ★★★ 改文字看这里：本文件所有可见文案都集中在最底部的 <script> 里的
            SLIDES 常量（搜索 "★ 改文案区"）。改那一处即可，不用动 HTML/CSS。
            改完直接保存、刷新浏览器即生效（纯静态，无需构建）。
       ===================================================================== -->

  <style>
    /* ---- 配色 / 字体：与游戏 style.css 完全一致（终端监控台风） ---- */
    :root {
      color-scheme: dark;
      --bg: #07090b;
      --bg-soft: #0b0f12;
      --surface: rgba(9, 13, 15, 0.94);
      --line: #263137;
      --line-strong: #3a4a51;
      --text: #eaf7f0;
      --muted: #8ea39a;
      --accent: #2bd98a;
      --accent-strong: #178f5b;
      --green-glow: #39ffa0;
      --warn: #ffc14d;
      --danger: #ff5d5d;
      --blue: #4aa8ff;
      --arbitrage: #2bd9c0;
      --sandwich: #8a8cff;
      --front-run: #ff9d3d;
      --liquidation: #ff5d8f;
      --nft-snipe: #b07cff;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background:
        radial-gradient(1200px 500px at 70% -10%, rgba(43, 217, 138, 0.08), transparent 60%),
        linear-gradient(180deg, rgba(43, 217, 138, 0.13), transparent 32%),
        linear-gradient(90deg, rgba(43, 217, 138, 0.055) 1px, transparent 1px),
        linear-gradient(180deg, rgba(43, 217, 138, 0.045) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 26px 26px, 26px 26px, auto;
      color: var(--text);
      font-family: "JetBrains Mono", "Noto Sans SC", ui-monospace, Consolas, sans-serif;
      overflow: hidden;
    }
    /* 扫描线叠层 */
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(180deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 3px);
    }

    /* ---- 幻灯舞台 ---- */
    .deck { position: relative; z-index: 1; height: 100vh; width: 100vw; }
    .slide {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      justify-content: center;
      padding: 6vh 8vw;
      animation: fadein 0.4s ease;
    }
    .slide.active { display: flex; }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* 顶部小标签栏（每页都有，营造控制台感） */
    .chrome {
      position: fixed; top: 0; left: 0; right: 0; z-index: 2;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px;
      font-size: 12px; letter-spacing: 0.12em; color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: rgba(7,9,11,0.6);
    }
    .chrome .dot { color: var(--accent); }

    /* 文字层级 */
    .eyebrow { font-size: 14px; letter-spacing: 0.28em; color: var(--accent); text-transform: uppercase; margin-bottom: 18px; }
    h1.title { font-size: clamp(40px, 7vw, 96px); font-weight: 800; letter-spacing: 0.04em; margin: 0; line-height: 1.02; }
    .subtitle { font-size: clamp(14px, 1.6vw, 20px); letter-spacing: 0.34em; color: var(--muted); margin-top: 10px; text-transform: uppercase; }
    .lead { font-size: clamp(18px, 2.3vw, 30px); line-height: 1.5; margin: 28px 0 0; max-width: 60ch; }
    .lead .hl { color: var(--accent); font-weight: 700; }
    .footnote { font-size: clamp(13px, 1.3vw, 17px); color: var(--muted); margin-top: 30px; }

    /* 两栏对照（页A的 Web3 / AI 内核） */
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-top: 40px; }
    .col { border: 1px solid var(--line-strong); border-radius: 2px; padding: 26px 28px; background: var(--surface); }
    .col h3 { margin: 0 0 16px; font-size: clamp(16px, 1.8vw, 22px); letter-spacing: 0.1em; }
    .col.web3 h3 { color: var(--blue); }
    .col.ai h3 { color: var(--accent); }
    .col ul { margin: 0; padding-left: 0; list-style: none; }
    .col li { font-size: clamp(14px, 1.5vw, 19px); line-height: 1.9; color: var(--text); }
    .col li::before { content: "▸ "; color: var(--muted); }

    /* 三点编号列表（页B） */
    .points { margin-top: 38px; display: flex; flex-direction: column; gap: 22px; }
    .point { display: flex; gap: 20px; align-items: baseline; }
    .point .n { font-size: clamp(22px, 3vw, 40px); font-weight: 800; color: var(--accent); min-width: 1.4em; }
    .point .body { font-size: clamp(16px, 1.9vw, 24px); line-height: 1.45; }
    .point .body b { color: var(--green-glow); }
    .point .body span { color: var(--muted); }
    /* 内容页（section 类型）的小标题分组 */
    .section-list-title { margin-top: 26px; font-size: clamp(15px, 1.7vw, 21px); letter-spacing: 0.08em; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 14px; font-weight: 700; }
    /* 内联工具名（等宽代码样式） */
    .point .body code { color: var(--accent); background: rgba(43, 217, 138, 0.1); border: 1px solid var(--line-strong); border-radius: 2px; padding: 1px 6px; font-size: 0.92em; white-space: nowrap; }

    /* 收尾页标签芯片 */
    .chips { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 28px; }
    .chip { border: 1px solid var(--accent-strong); color: var(--accent); border-radius: 2px; padding: 10px 18px; font-size: clamp(13px, 1.4vw, 18px); letter-spacing: 0.06em; }
    /* 收尾页未来展望（紧凑，避免压住进游戏按钮） */
    .roadmap { margin-top: 26px; max-width: 80ch; }
    .roadmap-title { font-size: clamp(14px, 1.5vw, 19px); letter-spacing: 0.06em; color: var(--accent); font-weight: 700; margin-bottom: 12px; }
    .roadmap-item { font-size: clamp(13px, 1.35vw, 17px); line-height: 1.5; margin-bottom: 9px; padding-left: 16px; border-left: 2px solid var(--line-strong); }
    .roadmap-item b { color: var(--green-glow); }
    .roadmap-item span { color: var(--muted); }
    .origin { font-size: clamp(14px, 1.55vw, 20px); line-height: 1.55; color: var(--text); margin-top: 26px; max-width: 62ch; border-left: 3px solid var(--accent); padding-left: 20px; }
    .links { margin-top: 22px; font-size: clamp(13px, 1.4vw, 18px); color: var(--muted); }
    .links a { color: var(--accent); text-decoration: none; }
    .links a:hover { text-decoration: underline; }

    /* 进入游戏按钮（收尾页） */
    .enter-btn {
      margin-top: 40px; align-self: flex-start;
      font: inherit; font-size: clamp(16px, 1.8vw, 22px); font-weight: 700; letter-spacing: 0.1em;
      color: var(--bg); background: var(--accent); border: none; border-radius: 2px;
      padding: 16px 36px; cursor: pointer; transition: background 0.15s;
    }
    .enter-btn:hover { background: var(--green-glow); }
    .enter-btn:focus-visible { outline: 2px solid var(--text); outline-offset: 3px; }

    /* 底部导航 */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 2;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px; font-size: 13px; color: var(--muted);
      border-top: 1px solid var(--line); background: rgba(7,9,11,0.6);
    }
    .nav button {
      font: inherit; font-size: 13px; color: var(--text); background: transparent;
      border: 1px solid var(--line-strong); border-radius: 2px; padding: 6px 14px; cursor: pointer;
    }
    .nav button:hover { border-color: var(--accent); color: var(--accent); }
    .nav .pager { letter-spacing: 0.1em; }
    .nav .hint { color: var(--muted); opacity: 0.7; }
  </style>
</head>
<body>
  <div class="chrome">
    <span><span class="dot">●</span>&nbsp; AGENT RUSH // MEV EXECUTION CONSOLE</span>
    <span id="chrome-tag">DEMO DECK</span>
  </div>

  <!-- 幻灯内容由底部脚本根据 SLIDES 渲染进这里 -->
  <div class="deck" id="deck"></div>

  <div class="nav">
    <button id="prev">◀ 上一页 (←)</button>
    <span class="pager"><span id="cur">1</span> / <span id="total">3</span></span>
    <span class="hint">空格/→ 下一页 · F 全屏</span>
    <button id="next">下一页 (→) ▶</button>
  </div>

  <script>
    /* =====================================================================
       ★ 改文案区 —— 只改这里的文字即可。每页结构见注释。
       - 想改某句话：直接改对应字符串。
       - 想加/删一条 bullet：增删数组里的一项。
       - 想调整进游戏链接：改 ENTER_GAME_URL。
       - HTML 标签可用：<b> 加粗、<span class="hl"> 高亮绿、普通文字直接写。
       ===================================================================== */

    // 「进入游戏」按钮跳转目标。
    // 本地录制用：直接跳到本地服务的 demo 场景。
    // ⚠ 若要把 PPT 发到线上/给别人看，改成线上地址或相对路径 '../../index.html?demo=1'。
    const ENTER_GAME_URL = 'http://localhost:8000/?demo=1';

    const SLIDES = [
      // ---------- 幻灯页 A：一句话定义 + AI×Web3 双钩子 ----------
      {
        tag: '01 / WHAT IS IT',
        type: 'cover',
        eyebrow: 'Z.AI 赛道 · Web3 × 长程任务能力',
        title: 'AGENT RUSH',
        subtitle: 'MEV EXECUTION CONSOLE',
        lead: '你是一名以太坊上的 MEV 搜索者（searcher），挑机会、分 Gas、定预案。然后把方案交给你的 AI Agent Executor，它去规划、调用工具，被对手抢了就临场重规划。<span class="hl">你定策略，Executor 替你上场。</span>',
        cols: {
          web3: {
            heading: 'Web3 内核',
            items: [
              '真实以太坊 MEV 博弈的简化',
              '套利 / 夹击 / 抢跑 / 清算 / NFT 抢购',
              'mempool · Gas 竞价 · 被对手抢占',
            ],
          },
          ai: {
            heading: 'AI 内核',
            items: [
              'GLM 驱动的长程 Agent',
              '任务分解 → 调用链上工具',
              '被抢时实时重规划 → 自然语言交付',
            ],
          },
        },
        footnote: 'MEV Roguelike Game × Long-Horizon Agent',
      },

      // ---------- 幻灯页 B：背景（长程 Agent 的展示困境 + MEV 为何天然契合） ----------
      {
        tag: '02 / BACKGROUND',
        type: 'section',
        eyebrow: '背景',
        heading: '长程 Agent 的展示困境',
        lead: 'Agent 的价值在于「<span class="hl">怎么一步步把复杂目标做完</span>」——但大多数应用只给用户看最终结果。规划、工具调用、错误修复，全藏在后台。',
        listTitle: 'MEV 是天然的长程对抗场景',
        points: [
          { body: '<b>资源约束真实</b> <span>—— Gas 有限，多张牌共享一个池</span>' },
          { body: '<b>对抗压力真实</b> <span>—— 对手 Bot 抢同一笔利润，倒逼实时重规划</span>' },
          { body: '<b>信息不对称真实</b> <span>—— 骗局牌伪装低风险，考验玩家排雷</span>' },
        ],
        footnote: 'Agent Rush 把 Agent 的全过程摊开给人看——顺带让没碰过 Web3 的人玩一遍就懂 MEV。',
      },

      // ---------- 幻灯页 C：核心设计（你定战术，Executor 替你执行） ----------
      {
        tag: '03 / THE DESIGN',
        type: 'section',
        eyebrow: '核心设计',
        heading: '你定战术，Executor 替你执行',
        lead: '全游戏<span class="hl">只有一个地方用了 LLM</span>——Executor 的执行循环。其余部分明确标注为规则引擎。',
        listTitle: 'Executor 的四步循环',
        points: [
          { body: '<b>任务分解</b> <span>—— 把「执行 N 张牌」拆开排序</span>' },
          { body: '<b>工具调用</b> <span>—— 7 个链上模拟工具自主挑选：<code>fetch_prices</code> / <code>monitor_mempool</code> / <code>broadcast_tx</code> / <code>replace_tx</code> / <code>scan_replacement</code> / <code>reallocate_gas</code> / <code>abandon_card</code></span>' },
          { body: '<b>重规划</b> <span>—— 被抢占 / Gas 不足 / 玩家干预，实时调整</span>' },
          { body: '<b>闭环交付</b> <span>—— 自然语言复盘，生成结算报告</span>' },
        ],
        footnote: '思维链逐字流式展示，玩家看到的是 AI 实时思考的过程。',
      },

      // ---------- 幻灯页 D：How to play（游戏规则） ----------
      {
        tag: '04 / HOW TO PLAY',
        type: 'section',
        eyebrow: 'How to play · 游戏规则',
        heading: '每层一个回合循环，撑到第 20 层冲过收益线',
        lead: '每层都是「<span class="hl">扫描 → 决策 → 执行 → 结算</span>」：系统发机会牌，你做三维决策，Executor 半闭环执行，点结算才出损益报告。',
        listTitle: '你的三维决策（决策阶段）',
        points: [
          { body: '<b>选牌</b> <span>—— 从发到的机会牌里挑（每层 1→2→3 张随层解锁），骗局牌伪装低风险，先排雷</span>' },
          { body: '<b>分 Gas</b> <span>—— 多张牌共享一个池，此消彼长，分多分少决定谁更稳</span>' },
          { body: '<b>设预案</b> <span>—— 遇袭怎么办：硬刚 <code>fight</code> / 放弃 <code>abandon</code> / 转移 <code>transfer</code>；执行中还有一次 60s 临场干预</span>' },
        ],
        footnote: '胜利：撑到第 20 层且累计收益 > 8.75 ETH。失败：连亏 ≥ 2 且累计为负。顶部实时显示离胜负线还有多远。',
      },

      // ---------- 幻灯页 E：收尾（含进入游戏按钮） ----------
      {
        tag: '05 / AGENT RUSH',
        type: 'closing',
        eyebrow: 'AI × Web3',
        lead: '一个 LLM 长程 Agent，在真实 MEV 对抗里，<span class="hl">替你规划、执行、应变、交付。</span>',
        chips: ['GLM 长程能力可见', '真实 Web3 MEV 内核', '浏览器打开即玩'],
        // 未来展望（极简两方向，放在 chips 与缘起之间）。想删就整段删掉 roadmap。
        roadmap: {
          title: '🚀 未来展望',
          items: [
            { body: '<b>从模拟器到真实链上沙盘</b> <span>—— 接入实时 mempool 生成机会卡、分叉 EVM 真实执行交易、对齐 Flashbots Bundle 现代 MEV 架构</span>' },
            { body: '<b>抽象为通用长程对抗 Agent</b> <span>—— 解耦 MEV 业务后，同一套「意图-资源-Tool loop-动态冲突」可承载跨链流动性、多 Agent 同场竞争等场景</span>' },
          ],
        },
        // 作者缘起（真诚的一句）。想改语气就改这里。
        origin: '我是 Web3 新手，刚刚接触 Web3 的各种概念。做这个游戏，是想亲手体会一次链上抢夺的乐趣，也让任何人玩过就懂 MEV。',
        // 底部链接。改 text 改显示文字，改 href 改跳转。
        links: [
          { text: '在线试玩：https://agent-rush.vercel.app/', href: 'https://agent-rush.vercel.app/' },
          { text: 'GitHub：https://github.com/chxii/agent-rush', href: 'https://github.com/chxii/agent-rush' },
        ],
        enterLabel: '进入游戏 ▶',
      },
    ];

    /* =====================================================================
       ↓↓↓ 渲染逻辑（一般不用改） ↓↓↓
       ===================================================================== */

    const deck = document.getElementById('deck');

    function renderSlide(s) {
      const el = document.createElement('section');
      el.className = 'slide';

      if (s.type === 'cover') {
        el.innerHTML = `
          <div class="eyebrow">${s.eyebrow}</div>
          <h1 class="title">${s.title}</h1>
          <div class="subtitle">${s.subtitle}</div>
          <p class="lead">${s.lead}</p>
          <div class="cols">
            <div class="col web3">
              <h3>${s.cols.web3.heading}</h3>
              <ul>${s.cols.web3.items.map((i) => `<li>${i}</li>`).join('')}</ul>
            </div>
            <div class="col ai">
              <h3>${s.cols.ai.heading}</h3>
              <ul>${s.cols.ai.items.map((i) => `<li>${i}</li>`).join('')}</ul>
            </div>
          </div>
          <div class="footnote">${s.footnote}</div>`;
      } else if (s.type === 'points') {
        el.innerHTML = `
          <div class="eyebrow">${s.eyebrow}</div>
          <h1 class="title" style="font-size:clamp(28px,4vw,52px);line-height:1.15">${s.heading}</h1>
          <div class="points">
            ${s.points.map((p, idx) => `
              <div class="point"><span class="n">${idx + 1}</span><span class="body">${p.body}</span></div>
            `).join('')}
          </div>
          <div class="footnote">${s.footnote}</div>`;
      } else if (s.type === 'section') {
        el.innerHTML = `
          <div class="eyebrow">${s.eyebrow}</div>
          <h1 class="title" style="font-size:clamp(26px,3.6vw,46px);line-height:1.12">${s.heading}</h1>
          <p class="lead" style="font-size:clamp(15px,1.7vw,21px);margin-top:18px">${s.lead}</p>
          ${s.listTitle ? `<div class="section-list-title">${s.listTitle}</div>` : ''}
          <div class="points" style="margin-top:14px;gap:13px">
            ${s.points.map((p, idx) => `
              <div class="point"><span class="n">${idx + 1}</span><span class="body" style="font-size:clamp(14px,1.5vw,19px)">${p.body}</span></div>
            `).join('')}
          </div>
          <div class="footnote">${s.footnote}</div>`;
      } else if (s.type === 'closing') {
        el.innerHTML = `
          <div class="eyebrow">${s.eyebrow}</div>
          <p class="lead" style="margin-top:0">${s.lead}</p>
          <div class="chips">${s.chips.map((c) => `<span class="chip">${c}</span>`).join('')}</div>
          ${s.roadmap ? `
          <div class="roadmap">
            <div class="roadmap-title">${s.roadmap.title}</div>
            ${s.roadmap.items.map((it) => `<div class="roadmap-item">${it.body}</div>`).join('')}
          </div>` : ''}
          <div class="origin">${s.origin}</div>
          <div class="links">${s.links.map((l) => `<a href="${l.href}">${l.text}</a>`).join('　·　')}</div>
          <button class="enter-btn" id="enter-game">${s.enterLabel}</button>`;
      }
      return el;
    }

    SLIDES.forEach((s) => deck.appendChild(renderSlide(s)));

    const slides = Array.from(deck.querySelectorAll('.slide'));
    const tagEl = document.getElementById('chrome-tag');
    const curEl = document.getElementById('cur');
    const totalEl = document.getElementById('total');
    totalEl.textContent = slides.length;

    let idx = 0;
    function show(n) {
      idx = Math.max(0, Math.min(slides.length - 1, n));
      slides.forEach((s, i) => s.classList.toggle('active', i === idx));
      curEl.textContent = idx + 1;
      tagEl.textContent = SLIDES[idx].tag || 'DEMO DECK';
      // 进游戏按钮（仅收尾页有）
      const btn = document.getElementById('enter-game');
      if (btn) btn.onclick = () => { window.location.href = ENTER_GAME_URL; };
    }
    show(0);

    document.getElementById('next').onclick = () => show(idx + 1);
    document.getElementById('prev').onclick = () => show(idx - 1);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); show(idx + 1); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); show(idx - 1); }
      else if (e.key === 'f' || e.key === 'F') {
        if (document.fullscreenElement) document.exitFullscreen();
        else document.documentElement.requestFullscreen();
      }
    });
  </script>
</body>
</html>
